name: ci
on:
  push:
    branches: [main]
  pull_request:
jobs:
  # Fast mocked-unit matrix. The ffmpeg-marked subset is excluded here
  # explicitly and enforced (skips impossible) in the dedicated jobs below.
  test:
    timeout-minutes: 30
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    env:
      ZING_REQUIRE_OTIO: "1"
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - run: pip install -e .[dev] "OpenTimelineIO>=0.18,<0.19"
      - run: pytest -q -m "not ffmpeg"

  # F-01 / C-1.3 / C#8 / C#9 — the real ffmpeg gates, Ubuntu (full):
  # ffmpeg installed explicitly, version + required filters verified up
  # front, golden generation + eval scorer + the ffmpeg-marked tests run
  # for real. ZING_REQUIRE_FFMPEG=1 makes tests/conftest.py FAIL (never
  # skip or xfail) every selected test, while the exact count pin makes
  # any accidental deselection fatal — this job cannot silently degrade
  # to mocked-only coverage. (run.py --study needs the
  # heavy [study] extras and stays out of the PR gate per S1-REVIEW-lane-b.)
  ffmpeg-gates-ubuntu:
    timeout-minutes: 30
    runs-on: ubuntu-latest
    env:
      ZING_REQUIRE_FFMPEG: "1"
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install ffmpeg (apt)
        timeout-minutes: 10
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends ffmpeg fonts-dejavu-core
      - name: Verify ffmpeg version and required filters (C#8)
        run: |
          ffmpeg -version
          ffprobe -version
          for filter in drawtext subtitles sidechaincompress; do
            if ffmpeg -hide_banner -filters | awk '{print $2}' | grep -qx "$filter"; then
              echo "filter present: $filter"
            else
              echo "::error::required ffmpeg filter missing: $filter"
              exit 1
            fi
          done
      - run: pip install -e .[dev]
      - name: Golden generation (real ffmpeg fixtures, hostile paths)
        run: python -m tools.eval.make_goldens --output "tools/eval/goldens"
      - name: Breakdown + profile eval with machine-readable report
        run: python -m tools.eval.run --sample --profiles --report "tools/eval/eval-report.json"
      - name: ffmpeg-marked test subset (skips are failures)
        run: pytest -q -m ffmpeg --expected-ffmpeg-tests 22
      - name: Keep eval report as artifact on failure (C#9)
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: eval-report-ubuntu
          path: tools/eval/eval-report.json
          if-no-files-found: warn

  # C#8 — focused Windows job: real ffmpeg on windows-latest running the
  # path-handling / ASS / render-smoke subset (hostile-path golden
  # generation + the full render integration oracle). Same no-skip rule.
  ffmpeg-smoke-windows:
    timeout-minutes: 30
    runs-on: windows-latest
    env:
      ZING_REQUIRE_FFMPEG: "1"
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install ffmpeg (chocolatey)
        timeout-minutes: 10
        run: choco install ffmpeg -y --no-progress
      - name: Verify ffmpeg version and required filters (C#8)
        shell: bash
        run: |
          ffmpeg -version
          ffprobe -version
          for filter in drawtext subtitles sidechaincompress; do
            if ffmpeg -hide_banner -filters | awk '{print $2}' | grep -qx "$filter"; then
              echo "filter present: $filter"
            else
              echo "::error::required ffmpeg filter missing: $filter"
              exit 1
            fi
          done
      - run: pip install -e .[dev]
      - name: Path-handling / ASS / render smoke subset (skips are failures)
        run: pytest -q -m ffmpeg --expected-ffmpeg-tests 22

  # First macOS gate: keep the broad mocked/unit suite in the matrix above,
  # then prove Homebrew ffmpeg can generate media and Zing can extract real
  # frames from it. The required-mode env makes a missing ffmpeg/ffprobe a
  # hard failure instead of an honest local-development skip.
  ffmpeg-smoke-macos:
    timeout-minutes: 30
    runs-on: macos-latest
    env:
      ZING_REQUIRE_FFMPEG: "1"
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install ffmpeg (Homebrew)
        timeout-minutes: 10
        run: brew install ffmpeg
      - name: Verify ffmpeg and ffprobe
        run: |
          ffmpeg -version
          ffprobe -version
      - run: pip install -e .[dev]
      - name: Real frame extraction smoke (skips are failures)
        run: pytest -q tests/test_mcp_frames.py::test_get_frames_real_two_color_probe

  # S5 Lane B: fresh-host install gate — wheel -> bare venv -> first-run
  # surface, NO repo checkout on the tested path (packaged data must
  # carry everything). The gate record uploads as an artifact per OS.
  clean-install:
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install ffmpeg (apt)
        if: runner.os == 'Linux'
        timeout-minutes: 10
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends ffmpeg
      - name: Install ffmpeg (chocolatey)
        if: runner.os == 'Windows'
        timeout-minutes: 10
        run: choco install ffmpeg -y --no-progress
      - name: Install ffmpeg (brew)
        if: runner.os == 'macOS'
        timeout-minutes: 10
        run: brew install ffmpeg
      - name: Clean-host gate
        run: python packaging/clean_host_check.py --require-study --report clean-host-${{ matrix.os }}.json
      - name: Upload gate record
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: clean-host-${{ matrix.os }}
          path: clean-host-*.json
